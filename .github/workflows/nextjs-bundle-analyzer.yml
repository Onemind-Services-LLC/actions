name: Next.js Bundle Analysis

on:
  workflow_call:
    inputs:
      runs-on:
        description: GitHub runner label
        required: false
        default: 'ubuntu-22.04-sh'
        type: string
      node-version:
        description: Node.js version to use
        required: false
        default: '18'
        type: string
      registry-url:
        description: Optional npm registry URL for scoped/private packages
        required: false
        default: ''
        type: string
      registry-scope:
        description: Optional npm scope (e.g., '@your-scope') for auth
        required: false
        default: ''
        type: string
      working-directory:
        description: Directory containing the Next.js app
        required: false
        default: '.'
        type: string
      install-command:
        description: Install command to run (optional, overrides defaults)
        required: false
        default: ''
        type: string
      build-command:
        description: Build command to run (optional, overrides defaults)
        required: false
        default: ''
        type: string
      extra-env:
        description: Newline-delimited KEY=VALUE pairs exported to GITHUB_ENV
        required: false
        default: ''
        type: string
      use-org-github-token:
        description: Use secrets.ORG_GITHUB_TOKEN instead of github.token for package, artifact, and PR comment access
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read
  packages: read
  pull-requests: write

jobs:
  analyze:
    name: Analyze Bundle
    runs-on: ${{ inputs.runs-on }}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      SELECTED_GITHUB_TOKEN: ${{ inputs.use-org-github-token && secrets.ORG_GITHUB_TOKEN || github.token }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Ensure PR context
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "This reusable workflow must be invoked from a pull_request event." >&2
          exit 1

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect Package Manager
        id: pm
        uses: Onemind-Services-LLC/actions/actions/detect-package-manager@master
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Apply extra environment variables
        if: inputs.extra-env != ''
        run: |
          printf "%s\n" "$INPUT" >> "$GITHUB_ENV"
        env:
          INPUT: ${{ inputs.extra-env }}

      - name: Install & Build
        uses: Onemind-Services-LLC/actions/actions/node-install-build@master
        with:
          package-manager: ${{ steps.pm.outputs.package-manager }}
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}
          install-command: ${{ inputs.install-command }}
          build-command: ${{ inputs.build-command }}
          registry-url: ${{ inputs.registry-url }}
          registry-scope: ${{ inputs.registry-scope }}
          npm-token: ${{ env.SELECTED_GITHUB_TOKEN }}

      - name: Analyze bundle
        run: npx -y -p nextjs-bundle-analysis report

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-bundle-analysis
          path: .next/analyze/__bundle_analysis.json
          overwrite: true

      - name: Download base branch artifact
        uses: dawidd6/action-download-artifact@ac66b43f0e6a346234dd65d4d0c8fbb31cb316e5 # v11
        with:
          branch: ${{ github.event.pull_request.base.ref }}
          path: .next/analyze/base
          github_token: ${{ env.SELECTED_GITHUB_TOKEN }}
          if_no_artifact_found: warn

      - name: Compare with base
        run: npx -y nextjs-bundle-analysis compare
        continue-on-error: true

      - name: Get Comment Body
        id: get-comment-body
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat .next/analyze/__bundle_analysis_comment.txt >> $GITHUB_OUTPUT
          echo EOF >> $GITHUB_OUTPUT

      - name: Find Comment
        id: fc
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '<!-- __NEXTJS_BUNDLE -->'
          token: ${{ env.SELECTED_GITHUB_TOKEN }}

      - name: Create Comment
        if: steps.fc.outputs.comment-id == 0
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.get-comment-body.outputs.body }}
          token: ${{ env.SELECTED_GITHUB_TOKEN }}

      - name: Update Comment
        if: steps.fc.outputs.comment-id != 0
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.get-comment-body.outputs.body }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          token: ${{ env.SELECTED_GITHUB_TOKEN }}
