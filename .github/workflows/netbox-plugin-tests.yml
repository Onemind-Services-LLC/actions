name: NetBox Plugin Tests

on:
  workflow_call:
    inputs:
      plugin-name:
        description: 'The name of the NetBox plugin, eg: netbox_secrets'
        required: true
        type: string
      netbox-version:
        description: 'NetBox version to use, eg: v4.3.0'
        required: false
        default: 'v4.5.5'
        type: string
      python-version:
        description: 'Python version to use, eg: 3.12'
        required: false
        default: '3.12'
        type: string
      runs-on:
        description: 'GitHub runner to use'
        required: false
        type: string
        default: 'ubuntu-22.04-sh'
      coverage-minimum:
        description: 'Minimum acceptable code coverage percentage'
        required: false
        type: number
        default: 100
      coverage-args:
        description: 'Extra arguments passed to `coverage xml` (e.g. --omit=*/migrations/*,*/templates/*,*/static/*)'
        required: false
        type: string
        default: '--omit=*/migrations/*,*/templates/*,*/static/*,*/tests/*'
      use-org-github-token:
        description: 'Use secrets.ORG_GITHUB_TOKEN instead of github.token for repo checkout, installs, and PR comments'
        required: false
        default: false
        type: boolean

env:
  ACTIONS_WORKING_DIRECTORY: actions
  NETBOX_WORKING_DIRECTORY: netbox

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Pre-commit
    uses: Onemind-Services-LLC/actions/.github/workflows/pre-commit.yml@master
    with:
      runs-on: ${{ inputs.runs-on }}

  test:
    name: Run Tests
    runs-on: ${{ inputs.runs-on }}
    needs: lint
    # Intentionally rely on `secrets: inherit` from the caller so `ORG_GITHUB_TOKEN`
    # cannot be remapped via `workflow_call.secrets`.
    env:
      SELECTED_GITHUB_TOKEN: ${{ inputs.use-org-github-token && secrets.ORG_GITHUB_TOKEN || github.token }}

    services:
      redis:
        image: registry.onemindservices.com/docker.io/library/redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      postgres:
        image: registry.onemindservices.com/docker.io/library/postgres:17-alpine
        env:
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
          POSTGRES_DB: netbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout NetBox Repository
        uses: actions/checkout@v6
        with:
          repository: "netbox-community/netbox"
          path: netbox
          ref: ${{ inputs.netbox-version }}

      - name: Checkout Plugin Repository
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.plugin-name }}

      - name: Checkout Actions Repository
        uses: actions/checkout@v6
        with:
          repository: "Onemind-Services-LLC/actions"
          path: ${{ env.ACTIONS_WORKING_DIRECTORY }}
          ref: master
          token: ${{ env.SELECTED_GITHUB_TOKEN }}

      - name: Setup NetBox Requirements
        uses: Onemind-Services-LLC/actions/actions/python-setup-install@master
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ env.NETBOX_WORKING_DIRECTORY }}
          pre-install-commands: |
            sudo apt-get update && sudo apt-get install -y libpq-dev
            python3 -m pip install "setuptools<81"

      - name: Setup Plugin Requirements
        uses: Onemind-Services-LLC/actions/actions/python-setup-install@master
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.plugin-name }}
          github-token: ${{ env.SELECTED_GITHUB_TOKEN }}
          extra-install-commands: |
            pip install -e .

      - name: Use Plugin Test Configuration
        run: |
          cp -f "${{ inputs.plugin-name }}/testing_configuration/configuration.py" \
            "${{ env.NETBOX_WORKING_DIRECTORY }}/netbox/netbox/configuration.py"

      - name: Run Tests
        uses: Onemind-Services-LLC/actions/actions/django-test-runner@master
        with:
          working-directory: ${{ env.NETBOX_WORKING_DIRECTORY }}/netbox
          django-settings-module-key: NETBOX_CONFIGURATION
          django-settings-module: netbox.configuration
          test-args: ${{ inputs.plugin-name }}.tests
          coverage-report: true
          coverage-github-token: ${{ env.SELECTED_GITHUB_TOKEN }}
          coverage-pull-request-number: ${{ github.event.pull_request.number || '' }}
          coverage-source: ${{ inputs.plugin-name }}
          coverage-minimum: ${{ inputs.coverage-minimum }}
          coverage-args: ${{ inputs.coverage-args }}
          verbosity: '3'